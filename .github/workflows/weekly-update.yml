name: Weekly Blog Rotation

on:
  schedule:
    # Run at 17:00 UTC every Friday
    - cron: '0 17 * * 5'
  workflow_dispatch:
    # Allow manual triggering from the GitHub UI

permissions:
  contents: write

jobs:
  rotate-blog:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Run rotation script
      run: node scripts/rotate-blog.js
      
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git commit -m "chore(seo): rotate blog posts and update timestamp [skip ci]" || echo "No changes to commit"
        git push
