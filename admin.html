<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Criollo Grill</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Override global cursor:none from styles.css */
        body, * { cursor: auto !important; }
        .admin-container { max-width: 600px; margin: 4rem auto; padding: 2rem; background: var(--bg-card); border-radius: 8px; }
        .hidden { display: none; }
        .admin-title { text-align: center; margin-bottom: 2rem; color: var(--primary); }
        .form-group label { font-size: 0.9rem; color: #ccc; margin-bottom: 0.5rem; display: block; }
        .form-group input { width: 100%; padding: 0.8rem; background: var(--bg-dark); border: 1px solid #333; color: white; border-radius: 4px; margin-bottom: 1rem; }
        .btn-primary { cursor: pointer !important; }
        input, button { cursor: auto !important; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="login-section" class="admin-container">
            <h2 class="admin-title">Acceso Restringido</h2>
            <div class="form-group">
                <input type="password" id="admin-pin" placeholder="Ingresa el PIN de seguridad">
            </div>
            <button id="btn-login" class="btn-primary btn-full">Ingresar</button>
        </div>

        <!-- Admin Dashboard -->
        <div id="dashboard-section" class="admin-container hidden">
            <h2 class="admin-title">Configuración de Precios (Kr)</h2>
            <p style="text-align:center; color:#aaa; font-size:0.9rem; margin-top:-1rem; margin-bottom:2rem;">
                Estos valores se guardan en Supabase y actualizan la calculadora principal en vivo.
            </p>

            <form id="config-form">
                <div class="form-group"><label>Carne Premium Arg (x Kg)</label><input type="number" id="carnePremiumKg" required></div>
                <div class="form-group"><label>Carne Europea (x Kg)</label><input type="number" id="carneEuropeaKg" required></div>
                <div class="form-group"><label>Pan (x persona)</label><input type="number" id="panPorPersona" required></div>
                <div class="form-group"><label>Aderezos (x persona)</label><input type="number" id="aderezosPorPersona" required></div>
                <div class="form-group"><label>Packaging (x persona)</label><input type="number" id="packagingPorPersona" required></div>
                <div class="form-group"><label>Ensalada (x Kg)</label><input type="number" id="ensaladaKg" required></div>
                <div class="form-group"><label>Picada (x Kg)</label><input type="number" id="picadaKg" required></div>
                <div class="form-group"><label>Guarnición de Verduras estimadas (x persona)</label><input type="number" id="verdurasPorPersona" required></div>
                <div class="form-group"><label>Costo Asador (x Hora)</label><input type="number" id="asadorHora" required></div>
                <div class="form-group"><label>Costo Asistente (x Hora)</label><input type="number" id="asistenteHora" required></div>
                <div class="form-group"><label>Costo de Logística / Envío</label><input type="number" id="logistica" required></div>
                
                <button type="submit" class="btn-primary btn-full" id="btn-save">Guardar Cambios en Supabase</button>
            </form>
            <p id="save-status" style="text-align:center; margin-top:1rem; color: #4CAF50; display:none;">¡Guardado exitosamente!</p>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/admin.js"></script>
</body>
</html>
